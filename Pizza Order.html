<!DOCTYPE html>
<html lang="EN">

<head>
        <title>Pizza Pizza</title>
        <link rel="stylesheet" href="PIZZA.css">
        <meta charset="UTF-8">
        <meta name="description" content="Test Form Page">
        <meta name="keywords" content="Four County Carrer Center">
    
</head>
<body>
    <form id="Order Pizza Pizza" action="index.html" method="post">
        <p>
            Order Pizza Pizza
           
        </p>
        <p>
               Name:  ㅤㅤㅤㅤ<input type="text" name="Name" id="Name">
        </p>
        <p>
               Adress: ㅤㅤㅤ <input type="text" name="addy" id="addy">
        </p>
        <p>
            Phone Number: <input type="text" name="Number" id="Number">
        </p>
        <p>
           PIZZA Size:  
        </p>
        <p><input type="radio" name="Size" id="Size">
            <label for="small">small</label><br>
        <input type="radio" name="Size" id="Size">
        <label for="Medium">Medium</label><br>
         <input type="radio" name="Size" id="Size">
         <label for="LARGE">LARGE</label>
        </p>
        <p> CHOOSE YOUR TOPPINGS</p>
        <p><input type="checkbox" name="Topping" id="Topping">
            <label for="Peperoni">Peperoni</label> <br>
            <input type="checkbox" name="Topping" id="Topping">
            <label for="Sausage">Sausage</label> <br>
            <input type="checkbox" name="Topping" id="Topping">
            <label for="Pineapple">Pineapple</label> <br>
            <input type="checkbox" name="Topping" id="Topping">
            <label for="Bacon">Bacon</label> <br>
            <input type="checkbox" name="Topping" id="Topping">
            <label for="Villager Meat">Villager Meat</label> <br>
        </p>
        <p> Notes To The Chef <br>
        <textarea name="Comments" id="comments" cols="30" rows="10"></textarea>
        </p>
        <p><input id="submit" type="submit" value="submit"></p>
        <p><input id="resetform" type="reset" value="reset"></p>
        
    </form>
</body>
</html>
